name: APISentinel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # No cache: 'npm' here — requires package-lock.json to exist first

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxss1 libxtst6 libnss3 libasound2 libatk-bridge2.0-0 \
            libgtk-3-0 libgbm-dev xvfb

      - name: Install Node dependencies
        run: npm install

      - name: Build AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: APISentinel-Linux
          path: dist/*.AppImage
          retention-days: 30
